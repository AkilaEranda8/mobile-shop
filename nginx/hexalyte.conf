# ── Redirect all HTTP → HTTPS ─────────────────────────────────────────
server {
    listen 80;
    server_name app.hexalyte.com api.shop.hexalyte.com admin2.hexalyte.com;
    return 301 https://$host$request_uri;
}

# ── Web App  (app.hexalyte.com → :3000) ───────────────────────────────
server {
    listen 443 ssl;
    server_name app.hexalyte.com;

    ssl_certificate     /etc/letsencrypt/live/app.hexalyte.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.hexalyte.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── Backend API  (api.shop.hexalyte.com → :3001) ──────────────────────
server {
