# Production-oriented Hexalyte stack — secrets from `.env` only.
# Copy `.env.example` → `.env` on the server (chmod 600).

services:
  postgres:
    image: postgres:16-alpine
    container_name: hexalyte_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hexalyte}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-hexalyte}
    ports:
      - 127.0.0.1:5434:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hexalyte-network
    healthcheck:
      test: [CMD-SHELL, pg_isready -U ${POSTGRES_USER:-hexalyte}]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hexalyte_redis
    ports:
      - 127.0.0.1:6380:6379
    volumes:
      - redis_data:/data
    networks:
      - hexalyte-network
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      - --bind
      - "0.0.0.0"
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - noeviction

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.prod
    container_name: hexalyte_backend
    restart: unless-stopped
    ports:
      - 127.0.0.1:3001:3001
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3001}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-https://app.hexalyte.com}
      API_PREFIX: ${API_PREFIX:-api/v1}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-}
      KC_REALM: ${KC_REALM:-hexalyte}
      KC_CLIENT_ID: ${KC_CLIENT_ID:-hexalyte-backend}
      KC_CLIENT_SECRET: ${KC_CLIENT_SECRET:-}
      KEYCLOAK_AUTH_ENABLED: ${KEYCLOAK_AUTH_ENABLED:-true}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-hexalyte-storage}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      BACKEND_URL: ${BACKEND_URL:-https://api.shop.hexalyte.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - hexalyte-network
      - fashionerp_default
    volumes:
      - uploads_data:/app/uploads
      - whatsapp_sessions:/app/data/whatsapp-sessions

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.shop.hexalyte.com/api/v1}
        NEXT_PUBLIC_ADMIN_API_URL: ${NEXT_PUBLIC_ADMIN_API_URL:-https://api.shop.hexalyte.com/admin/v1}
        NEXT_PUBLIC_WEB_URL: ${NEXT_PUBLIC_WEB_URL:-https://app.hexalyte.com}
    container_name: hexalyte_admin
    restart: unless-stopped
    ports:
      - 127.0.0.1:3002:3002
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.shop.hexalyte.com/api/v1}
      NEXT_PUBLIC_ADMIN_API_URL: ${NEXT_PUBLIC_ADMIN_API_URL:-https://api.shop.hexalyte.com/admin/v1}
      NEXT_PUBLIC_WEB_URL: ${NEXT_PUBLIC_WEB_URL:-https://app.hexalyte.com}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?Set NEXTAUTH_SECRET in .env}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://admin2.hexalyte.com}
    depends_on:
      - backend
    networks:
      - fashionerp_default

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.shop.hexalyte.com/api/v1}
        NEXT_PUBLIC_KEYCLOAK_URL: ${NEXT_PUBLIC_KEYCLOAK_URL:-https://auth.hexalyte.com}
    container_name: hexalyte_web
    restart: unless-stopped
    ports:
      - 127.0.0.1:3000:3000
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.shop.hexalyte.com/api/v1}
      NEXT_PUBLIC_KEYCLOAK_URL: ${NEXT_PUBLIC_KEYCLOAK_URL:-https://auth.hexalyte.com}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?Set NEXTAUTH_SECRET in .env}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://app.hexalyte.com}
    depends_on:
      - backend
    networks:
      - fashionerp_default

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  whatsapp_sessions:

networks:
  hexalyte-network:
    driver: bridge
  fashionerp_default:
    external: true
